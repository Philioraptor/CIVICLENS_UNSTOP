<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicLens | AI Powered Transparency</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Phosphor Icons for UI (lighter than Lucide via CDN) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border: 1px solid rgba(255,255,255,0.2); }
        .btn-primary { background-color: #1e3a8a; color: white; padding: 0.5rem 1.5rem; border-radius: 9999px; font-weight: 500; transition: all 0.3s; }
        .btn-primary:hover { background-color: #3b82f6; transform: scale(1.05); }
        .nav-link { color: #4b5563; transition: color 0.2s; display: flex; align-items: center; gap: 0.25rem; }
        .nav-link:hover { color: #1e3a8a; cursor: pointer; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        civic: {
                            blue: '#1e3a8a',
                            lightBlue: '#3b82f6',
                            green: '#10b981',
                            dark: '#0f172a',
                            light: '#f8fafc'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="text-gray-800 antialiased flex flex-col min-h-screen">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md border-b border-gray-200 h-16 flex items-center">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="showPage('home')">
                <i class="ph ph-map-pin-line text-3xl text-civic-blue"></i>
                <span class="font-bold text-xl text-civic-dark tracking-tight">CivicLens</span>
            </div>
            
            <div class="hidden md:flex space-x-8 items-center font-medium">
                <a class="nav-link" onclick="showPage('map')"><i class="ph ph-map-trifold"></i> Map</a>
                <a class="nav-link" onclick="showPage('dashboard')"><i class="ph ph-squares-four"></i> Dashboard</a>
                <a class="nav-link" onclick="showPage('feedback')"><i class="ph ph-chat-circle-text"></i> Feedback</a>
                <a class="btn-primary cursor-pointer flex items-center gap-2" onclick="showPage('login')"><i class="ph ph-sign-in"></i> Login</a>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow pt-16" id="app-container">
        <!-- Content gets injected by JS -->
    </main>

    <!-- Footer -->
    <footer class="bg-civic-dark text-white py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-gray-400">© 2026 CivicLens Platform. All rights reserved.</p>
            <p class="text-sm text-gray-500 mt-2">AI Powered Hyper-Local Governance Transparency</p>
        </div>
    </footer>

    <!-- Templates -->
    <template id="page-home">
        <section class="bg-gradient-to-br from-civic-lightBlue to-civic-blue text-white py-20 px-4 text-center">
            <h1 class="text-5xl md:text-7xl font-bold mb-6">CivicLens</h1>
            <p class="text-xl md:text-2xl font-light mb-10 opacity-90">AI Powered Hyper-Local Governance Transparency Platform</p>
            <p class="max-w-2xl mx-auto text-lg mb-10 opacity-80">Track government projects, view budgets, monitor timelines, and understand the impact of infrastructure changes right in your neighborhood.</p>
            <div class="flex flex-col sm:flex-row justify-center items-center gap-4">
                <button onclick="showPage('map')" class="bg-white text-civic-blue px-8 py-3 rounded-full font-semibold hover:bg-gray-100 transition-colors shadow-lg flex items-center gap-2">Explore Map <i class="ph ph-arrow-right"></i></button>
                <button onclick="showPage('dashboard')" class="border border-white text-white px-8 py-3 rounded-full font-semibold hover:bg-white/10 transition-colors">View Nearby Projects</button>
            </div>
        </section>

        <section class="py-20 px-4 bg-gray-50">
            <div class="max-w-6xl mx-auto">
                <h2 class="text-3xl font-bold text-center mb-16 text-civic-dark">How CivicLens Works</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="glass-card p-6 flex flex-col items-center text-center">
                        <div class="w-14 h-14 bg-blue-50 rounded-full flex items-center justify-center mb-4 text-2xl text-civic-blue"><i class="ph ph-navigation-arrow"></i></div>
                        <h3 class="text-xl font-semibold mb-2">Geofencing</h3>
                        <p class="text-gray-600">Detects nearby projects automatically based on your location.</p>
                    </div>
                    <div class="glass-card p-6 flex flex-col items-center text-center">
                        <div class="w-14 h-14 bg-blue-50 rounded-full flex items-center justify-center mb-4 text-2xl text-civic-blue"><i class="ph ph-brain"></i></div>
                        <h3 class="text-xl font-semibold mb-2">AI Summaries</h3>
                        <p class="text-gray-600">Simplifies complex government structural documents.</p>
                    </div>
                    <div class="glass-card p-6 flex flex-col items-center text-center">
                        <div class="w-14 h-14 bg-blue-50 rounded-full flex items-center justify-center mb-4 text-2xl text-civic-blue"><i class="ph ph-flag-banner"></i></div>
                        <h3 class="text-xl font-semibold mb-2">Feedback</h3>
                        <p class="text-gray-600">Submit issues and report directly to authorities.</p>
                    </div>
                </div>
            </div>
        </section>
    </template>

    <template id="page-map">
        <div class="h-[calc(100vh-4rem)] relative flex flex-col md:flex-row">
            <div class="w-full md:w-1/3 bg-white p-6 overflow-y-auto border-r border-gray-200 z-10 shadow-lg">
                <h2 class="text-2xl font-bold mb-6 text-civic-dark">Nearby Projects</h2>
                <div class="space-y-4">
                    <div class="p-4 border border-gray-100 rounded-xl hover:shadow-md bg-gray-50 transition-all cursor-pointer">
                        <h3 class="font-semibold text-lg text-civic-blue">Downtown Metro Expansion</h3>
                        <p class="text-sm text-gray-500 mb-2">Transit Authority</p>
                        <div class="flex gap-2 mb-3">
                            <span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">$450M Budget</span>
                            <span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full">2024 - 2026</span>
                        </div>
                    </div>
                    <div class="p-4 border border-gray-100 rounded-xl hover:shadow-md bg-gray-50 transition-all cursor-pointer">
                        <h3 class="font-semibold text-lg text-civic-blue">Riverside Park Renovation</h3>
                        <p class="text-sm text-gray-500 mb-2">Parks & Recreation</p>
                        <div class="flex gap-2 mb-3">
                            <span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">$12M Budget</span>
                            <span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full">Q3 2025</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="flex-1 h-full z-0" id="map-container"></div>
        </div>
    </template>

    <template id="page-dashboard">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-civic-dark">Citizen Dashboard</h1>
                    <p class="text-gray-600 mt-1">Track projects near your home and understand their community impact.</p>
                </div>
            </div>

            <div class="bg-blue-50 border border-blue-100 rounded-2xl p-6 mb-8 flex items-start gap-4 shadow-sm">
                <div class="bg-blue-500 text-white p-3 rounded-full shrink-0"><i class="ph ph-warning-circle text-2xl"></i></div>
                <div>
                    <h3 class="font-bold text-lg text-blue-900">Geofence Alert: You are near an active project</h3>
                    <p class="text-blue-800 mt-1">You are within 500m of the <strong>Downtown Metro Expansion</strong>. Expect slight traffic delays due to construction on Main St.</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-card p-6 border border-gray-100">
                    <h2 class="text-xl font-bold text-civic-dark mb-4 flex items-center gap-2"><i class="ph ph-camera text-civic-blue text-2xl"></i> Impact Visualizer</h2>
                    <div class="aspect-video bg-gray-200 rounded-xl overflow-hidden relative">
                        <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=2070" class="object-cover w-full h-full" alt="Cityscape" />
                    </div>
                    <div class="mt-4">
                        <h3 class="font-semibold text-lg">Riverside Park Renovation</h3>
                        <p class="text-sm text-gray-600 mt-1">Visualizing the addition of new green spaces and public restrooms.</p>
                    </div>
                </div>

                <div class="glass-card p-6 border border-gray-100">
                    <h2 class="text-xl font-bold text-civic-dark mb-4 flex items-center gap-2"><i class="ph ph-brain text-purple-600 text-2xl"></i> AI Summaries</h2>
                    <div class="bg-purple-50/50 p-4 border border-purple-100 rounded-xl">
                        <h3 class="font-bold text-md text-purple-900 mb-2">Downtown Metro Expansion</h3>
                        <p class="text-sm text-gray-700 leading-relaxed mb-3">
                            <strong>AI Summary:</strong> This project expands the metro line by 5 stops. It aims to reduce traffic congestion and improve downtown accessibility for over 50,000 daily commuters. 
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="page-feedback">
        <div class="max-w-3xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold text-civic-dark mb-4">Report an Issue</h1>
                <p class="text-gray-600">Help us improve your neighborhood by reporting infrastructure issues or providing direct feedback to the city council.</p>
            </div>
            <div class="glass-card p-8">
                <form class="space-y-6" onsubmit="event.preventDefault(); alert('Feedback successfully sent! Thank you.');">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
                            <input type="text" required class="w-full rounded-lg border-gray-300 border p-3 focus:ring-civic-blue" placeholder="John Doe" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                            <input type="email" required class="w-full rounded-lg border-gray-300 border p-3" placeholder="john@example.com" />
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Issue Type</label>
                        <select required class="w-full rounded-lg border-gray-300 border p-3 bg-white">
                            <option value="">Select issue type</option>
                            <option>Project Delay</option>
                            <option>Safety Hazard</option>
                            <option>General Feedback</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                        <textarea required rows="4" class="w-full rounded-lg border-gray-300 border p-3" placeholder="Describe the issue..."></textarea>
                    </div>
                    <button type="submit" class="w-full btn-primary py-3">Submit Feedback</button>
                </form>
            </div>
        </div>
    </template>

    <script>
        let mapInstance = null;

        function showPage(pageId) {
            const container = document.getElementById('app-container');
            const template = document.getElementById(`page-${pageId}`) || document.getElementById('page-home');
            container.innerHTML = template.innerHTML;

            // Handle map initialization separately
            if (pageId === 'map') {
                setTimeout(initMap, 100);
            } else if (mapInstance) {
                mapInstance.remove();
                mapInstance = null;
            }
        }

        function initMap() {
            const mapContainer = document.getElementById('map-container');
            if(!mapContainer) return;
            
            mapInstance = L.map('map-container').setView([40.7128, -74.0060], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(mapInstance);

            const userMarker = L.circleMarker([40.7128, -74.0060], { color: 'blue', radius: 8 }).addTo(mapInstance);
            userMarker.bindPopup("<b>Your Location</b>").openPopup();

            // Mock Projects
            const proj1 = L.circle([40.7150, -74.0150], {color: 'green', fillColor: '#10b981', fillOpacity: 0.2, radius: 1000}).addTo(mapInstance);
            proj1.bindPopup("<b>Downtown Metro Expansion</b><br>Budget: $450M");

            const proj2 = L.circle([40.7250, -73.9950], {color: 'green', fillColor: '#10b981', fillOpacity: 0.2, radius: 600}).addTo(mapInstance);
            proj2.bindPopup("<b>Riverside Park Renovation</b><br>Budget: $12M");
        }

        // Load Home by default
        window.onload = () => showPage('home');
    </script>
</body>
</html>
